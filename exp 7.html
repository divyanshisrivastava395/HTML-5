<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple Navigation Menu</title>
    <style>
    /*Block Example*/
header{
    display:block;
    background:lightgray;
    padding:10px;
    text-align:center;
}
/*Incline Example*/
header span{
    display:incline;
    color:red;
}
/*Incline-block Navigation*/
.incline-block-menu ul{
    list-style:none;
    padding:0;
}
.incline-block-menu li{
    display:inline-block;
    margin-right:10px;
}
.inline-block-menu a{
    text-decoration:none;
    padding:5px;
    background:lightblue;
}
/*Float Navigation*/
.float-menu ul{
    list-style:none;
    padding:0;
}
.float-menu li{
    float:left;
    margin-right:10px;
}
.float-menu a {
    text-decoration:none;
    padding:5px;
    background:lightgreen;
}
/*Clear Example*/
.clear{
    clear:both;
}
    </style>
</head>
<body>
    <!--Block Example-->
    <header>
        My<span>Website</span>Navigation
    </header>
    <!--Incline-block Example-->
    <nav class="incline-block-menu">
        <ul>
            <li><a href="#">Home</a></li>
             <li><a href="#">About</a></li>
              <li><a href="#">Service</a></li>
               <li><a href="#">Contact</a></li>
        </ul>
    </nav>
    <!--Float+ClearExample-->
    <nav class="float-menu">
        <ul>
             <li><a href="#">Dashboard</a></li>
              <li><a href="#">Profile</a></li>
               <li><a href="#">Messages</a></li>
                <li><a href="#">Logout</a></li>
        </ul>
        <div class="clear"></div>
    </nav>
</body>
</html>
